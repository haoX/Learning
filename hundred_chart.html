<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le tableau des 100 - CP</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #2c3e50;
    background: #f8f9fa;
    padding: 10mm;
  }

  /* ── Page structure ── */
  .page {
    width: 190mm;
    min-height: 270mm;
    margin: 0 auto 20mm;
    padding: 8mm;
    background: #fff;
    border-radius: 4mm;
    box-shadow: 0 2px 8px rgba(0,0,0,.1);
    page-break-after: always;
    overflow: hidden;
  }
  .page:last-child { page-break-after: avoid; }

  /* ── Titles ── */
  h1 {
    text-align: center;
    font-size: 28pt;
    margin-bottom: 3mm;
    color: #2c3e50;
    letter-spacing: 0.5px;
  }
  .instruction {
    text-align: center;
    font-size: 16pt;
    margin-bottom: 6mm;
    color: #555;
    font-style: italic;
  }

  /* ── Full Hundred Chart (Page 1 & 2) ── */
  .hundred-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 0;
    border: 2.5px solid #2c3e50;
    width: 100%;
    max-width: 174mm;
    margin: 0 auto;
  }
  .hundred-grid .cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22pt;
    font-weight: 600;
    border: 1px solid #aaa;
    min-height: 15mm;
  }
  /* Thick borders between tens rows */
  .hundred-grid .cell.row-border-top {
    border-top: 2.5px solid #2c3e50;
  }

  /* ── Color coding by tens ── */
  .tens-1  { background: #ffe0e0; } /* light red/pink */
  .tens-2  { background: #ffe8cc; } /* light orange */
  .tens-3  { background: #fff9cc; } /* light yellow */
  .tens-4  { background: #d4f5d4; } /* light green */
  .tens-5  { background: #ccf2f2; } /* light teal */
  .tens-6  { background: #cce0ff; } /* light blue */
  .tens-7  { background: #d8ccff; } /* light indigo */
  .tens-8  { background: #e8ccf5; } /* light purple */
  .tens-9  { background: #ffcce8; } /* light pink/magenta */
  .tens-10 { background: #e8e8e8; } /* light gray */

  /* Blank cell for exercises */
  .cell.blank {
    background: #fff !important;
    border: 1.5px dashed #999;
  }

  /* ── Page 3: Mini charts ── */
  .mini-charts-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8mm;
    max-width: 174mm;
    margin: 0 auto;
  }
  .mini-chart-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .mini-chart-label {
    font-size: 11pt;
    color: #777;
    margin-bottom: 1.5mm;
  }
  .mini-grid {
    display: grid;
    gap: 0;
    border: 2px solid #2c3e50;
  }
  .mini-grid.cols-3 { grid-template-columns: repeat(3, 20mm); }
  .mini-grid.cols-5 { grid-template-columns: repeat(5, 15.5mm); }
  .mini-grid .cell {
    height: 18mm;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18pt;
    font-weight: 600;
    border: 1px solid #aaa;
  }
  .mini-grid .cell.blank {
    background: #fff !important;
    border: 1.5px dashed #999;
  }

  /* ── Page 4: Vertical strips ── */
  .strips-container {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6mm;
    max-width: 174mm;
    margin: 0 auto;
  }
  .strip-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .strip-arrow {
    font-size: 12pt;
    color: #888;
    margin: 1mm 0;
  }
  .strip-grid {
    display: grid;
    grid-template-columns: 28mm;
    gap: 0;
    border: 2px solid #2c3e50;
  }
  .strip-grid .cell {
    height: 22mm;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20pt;
    font-weight: 600;
    border: 1px solid #aaa;
  }
  .strip-grid .cell.blank {
    background: #fff !important;
    border: 1.5px dashed #999;
  }

  /* Arrow annotation */
  .arrow-legend {
    text-align: center;
    font-size: 14pt;
    margin: 4mm 0 6mm;
    color: #555;
    line-height: 1.6;
  }
  .arrow-legend span {
    display: inline-block;
    margin: 0 6mm;
    font-weight: 600;
  }

  /* ── Print styles ── */
  @page { size: A4 portrait; margin: 8mm; }
  @media print {
    body {
      background: #fff;
      padding: 0;
      margin: 0;
    }
    *, *::before, *::after {
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }
    .page {
      box-shadow: none;
      border-radius: 0;
      margin: 0;
      padding: 6mm;
      width: 100%;
      min-height: auto;
    }
    .hundred-grid .cell {
      font-size: 20pt;
    }
    .strip-grid {
      grid-template-columns: 24mm;
    }
    .strip-grid .cell {
      height: 19mm;
    }
    .no-print { display: none !important; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     PAGE 1: Full Hundred Chart (1-100)
     ═══════════════════════════════════════════════════ -->
<div class="page" id="page1">
  <h1>Le tableau des 100</h1>
  <div class="instruction">Les nombres de 1 a 100</div>
  <div class="hundred-grid" id="full-chart"></div>
</div>

<!-- ═══════════════════════════════════════════════════
     PAGE 2: Partially Filled Hundred Chart
     ═══════════════════════════════════════════════════ -->
<div class="page" id="page2">
  <h1>Le tableau des 100</h1>
  <div class="instruction">Compl&egrave;te le tableau</div>
  <div class="hundred-grid" id="partial-chart"></div>
</div>

<!-- ═══════════════════════════════════════════════════
     PAGE 3: ±1, ±10 Mini-charts Practice
     ═══════════════════════════════════════════════════ -->
<div class="page" id="page3">
  <h1>Voisins du nombre</h1>
  <div class="instruction">Remplis les cases vides</div>
  <div class="arrow-legend">
    <span>&larr; &minus;1</span>
    <span>&rarr; +1</span>
    <span>&uarr; &minus;10</span>
    <span>&darr; +10</span>
  </div>
  <div class="mini-charts-container" id="mini-charts"></div>
</div>

<!-- ═══════════════════════════════════════════════════
     PAGE 4: ±10 Vertical Strips Practice
     ═══════════════════════════════════════════════════ -->
<div class="page" id="page4">
  <h1>Compter de 10 en 10</h1>
  <div class="instruction">Remplis les cases vides</div>
  <div class="arrow-legend">
    <span>&uarr; &minus;10</span>
    <span>&darr; +10</span>
  </div>
  <div class="strips-container" id="strips-top"></div>
  <div style="height:8mm;"></div>
  <div class="strips-container" id="strips-bottom"></div>
</div>

<script>
/* ── Helpers ── */
function tensClass(n) {
  const row = Math.ceil(n / 10);
  return 'tens-' + row;
}

function isRowStart(n) {
  return (n - 1) % 10 === 0 && n > 1;
}

function makeCell(n, isBlank, extraClasses) {
  const div = document.createElement('div');
  div.className = 'cell ' + tensClass(n) + (extraClasses ? ' ' + extraClasses : '');
  if (isRowStart(n)) div.classList.add('row-border-top');
  if (isBlank) {
    div.classList.add('blank');
    div.textContent = '';
  } else {
    div.textContent = n;
  }
  return div;
}

/* ── PAGE 1: Full chart ── */
(function() {
  const grid = document.getElementById('full-chart');
  for (let i = 1; i <= 100; i++) {
    grid.appendChild(makeCell(i, false));
  }
})();

/* ── PAGE 2: Partial chart (~30% blanks) ── */
(function() {
  // Strategic blanks: test ±1 neighbors, ±10 above/below, plus random
  const blanks = new Set([
    // Neighbors test (±1)
    3, 5, 8,
    12, 17, 19,
    24, 28,
    33, 36,
    42, 45, 49,
    53, 57,
    62, 66, 68,
    74, 77,
    83, 86, 89,
    93, 97,
    // Above/below test (±10)
    14, 34, 54, 74,  // column 4 vertical chain
    26, 46, 76,      // column 6 gaps
    // Additional random for ~30%
    7, 15, 22, 31, 39, 48,
    51, 58, 63, 71, 79, 82, 91, 95, 100
  ]);

  const grid = document.getElementById('partial-chart');
  for (let i = 1; i <= 100; i++) {
    grid.appendChild(makeCell(i, blanks.has(i)));
  }
})();

/* ── PAGE 3: Mini-charts (3x3 sections) ── */
(function() {
  const container = document.getElementById('mini-charts');

  // 8 mini-charts: center numbers chosen to give variety
  // Each is a 3x3 grid where center is given, some neighbors blank
  const centers = [15, 34, 47, 56, 23, 68, 82, 95];

  // For each center, define which of the 9 positions are shown
  // Positions: 0=top-left, 1=top-center, 2=top-right
  //            3=mid-left, 4=center,     5=mid-right
  //            6=bot-left, 7=bot-center, 8=bot-right
  // We show center + a few given, rest blank
  const shownSets = [
    [1, 3, 4, 8],       // center 15: show top, left, center, bot-right
    [4, 5, 6, 7],       // center 34
    [0, 4, 7, 5],       // center 47
    [1, 3, 4, 6],       // center 56
    [2, 4, 7, 3],       // center 23
    [4, 0, 5, 7],       // center 68
    [1, 4, 5, 8],       // center 82
    [3, 4, 1, 6],       // center 95
  ];

  centers.forEach((center, idx) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'mini-chart-wrapper';

    const grid = document.createElement('div');
    grid.className = 'mini-grid cols-3';

    // Map positions to actual numbers
    // Row above center: center-11, center-10, center-9
    // Row of center:    center-1,  center,    center+1
    // Row below center: center+9,  center+10, center+11
    const offsets = [-11, -10, -9, -1, 0, 1, 9, 10, 11];
    const shown = new Set(shownSets[idx]);

    for (let pos = 0; pos < 9; pos++) {
      const num = center + offsets[pos];
      const cell = document.createElement('div');
      const valid = num >= 1 && num <= 100;
      // Check the number is in a valid column relationship
      const centerCol = ((center - 1) % 10);
      const numCol = ((num - 1) % 10);
      const colDiff = offsets[pos] % 10;
      // Only show cells that are actually adjacent on the chart
      const validPos = valid && num > 0 && numCol >= 0;

      if (!valid) {
        cell.className = 'cell';
        cell.style.background = '#f0f0f0';
        cell.style.border = '1px solid #ddd';
      } else {
        cell.className = 'cell ' + tensClass(num);
        if (shown.has(pos)) {
          cell.textContent = num;
        } else {
          cell.classList.add('blank');
        }
      }
      grid.appendChild(cell);
    }

    wrapper.appendChild(grid);
    container.appendChild(wrapper);
  });
})();

/* ── PAGE 4: Vertical strips (±10) ── */
(function() {
  const topContainer = document.getElementById('strips-top');
  const bottomContainer = document.getElementById('strips-bottom');

  // 10 strips: each is 5 cells tall (column from hundred chart)
  // One number given per strip, rest blank
  const strips = [
    { start: 3,  given: 2 },  // 3,13,23,33,43 - show 23
    { start: 7,  given: 1 },  // 7,17,27,37,47 - show 17
    { start: 12, given: 3 },  // 12,22,32,42,52 - show 42
    { start: 5,  given: 0 },  // 5,15,25,35,45 - show 5
    { start: 19, given: 2 },  // 19,29,39,49,59 - show 39
    { start: 41, given: 1 },  // 41,51,61,71,81 - show 51
    { start: 26, given: 4 },  // 26,36,46,56,66 - show 66
    { start: 54, given: 0 },  // 54,64,74,84,94 - show 54
    { start: 38, given: 3 },  // 38,48,58,68,78 - show 68
    { start: 61, given: 2 },  // 61,71,81,91 (pad) - show 81
  ];

  strips.forEach((strip, idx) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'strip-wrapper';

    const grid = document.createElement('div');
    grid.className = 'strip-grid';

    for (let row = 0; row < 5; row++) {
      const num = strip.start + row * 10;
      if (num > 100) {
        // empty filler cell
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.style.background = '#f0f0f0';
        cell.style.border = '1px solid #ddd';
        grid.appendChild(cell);
        continue;
      }
      const cell = document.createElement('div');
      cell.className = 'cell ' + tensClass(num);
      if (row === strip.given) {
        cell.textContent = num;
      } else {
        cell.classList.add('blank');
      }
      grid.appendChild(cell);
    }

    wrapper.appendChild(grid);
    if (idx < 5) {
      topContainer.appendChild(wrapper);
    } else {
      bottomContainer.appendChild(wrapper);
    }
  });
})();
</script>

</body>
</html>
